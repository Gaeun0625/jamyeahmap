<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#EDE3CE" />
<title>잼얘여지도</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EDE3CE;
    --paper-deep:#E2D2AC;
    --paper-shadow:#D6C39B;
    --ink:#3B2E22;
    --ink-soft:#6B5842;
    --seal:#A6321E;
    --seal-dark:#7C2416;
    --jade:#3E5C54;
    --jade-dark:#2C433C;
    --gold-line:#B8935F;
    --note:#FBF6EA;
    --font-display:'Gowun Batang', serif;
    --font-hand:'Gaegu', cursive;
    --font-ui:'Noto Sans KR', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(184,147,95,0.10) 0, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(59,46,34,0.06) 0, transparent 40%);
    font-family:var(--font-ui);
    color:var(--ink);
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    padding:20px 18px 40px;
    position:relative;
  }
  ::selection{background:rgba(166,50,30,0.2);}
  button{font-family:var(--font-ui);cursor:pointer;}
  input, textarea{font-family:var(--font-ui);}
  :focus-visible{outline:2px solid var(--seal);outline-offset:2px;}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }

  /* ---------- 공통 컴포넌트 ---------- */
  .eyebrow{
    font-size:12px; letter-spacing:0.14em; color:var(--ink-soft);
    text-transform:uppercase; margin:0 0 6px;
  }
  .app-title{
    font-family:var(--font-display);
    font-size:34px; font-weight:700; margin:2px 0 2px;
    letter-spacing:0.01em;
  }
  .app-title .seal-part{color:var(--seal);}
  .app-sub{
    font-size:13.5px; color:var(--ink-soft); margin:0 0 22px;
  }
  .fold-divider{
    border:none; border-top:2px dashed var(--gold-line);
    opacity:0.55; margin:20px 0;
  }
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    border-radius:10px; border:none; padding:13px 18px;
    font-size:15px; font-weight:700; width:100%;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--seal); color:var(--note); box-shadow:0 3px 0 var(--seal-dark);}
  .btn-primary:active{box-shadow:0 1px 0 var(--seal-dark);}
  .btn-secondary{background:transparent; color:var(--jade); border:2px solid var(--jade); }
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--gold-line); font-weight:500;}
  .btn-row{display:flex; flex-direction:column; gap:12px; margin-top:18px;}
  .field{margin-bottom:16px;}
  .field label{
    display:block; font-size:12.5px; font-weight:700; color:var(--ink-soft);
    margin-bottom:6px; letter-spacing:0.02em;
  }
  .field input[type=text], .field textarea{
    width:100%; border:1.5px solid var(--gold-line); background:var(--note);
    border-radius:8px; padding:11px 12px; font-size:16px; color:var(--ink);
    resize:vertical;
  }
  .field textarea{min-height:80px; font-family:var(--font-ui); line-height:1.5;}
  .helper-text{font-size:12px; color:var(--ink-soft); margin-top:6px;}
  .error-text{font-size:12.5px; color:var(--seal); margin-top:6px; font-weight:600;}
  .center-screen{
    min-height:80vh; display:flex; flex-direction:column; justify-content:center;
  }
  .back-row{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
  .icon-btn{
    background:var(--note); border:1.5px solid var(--gold-line); border-radius:8px;
    width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    font-size:17px; color:var(--ink); flex-shrink:0;
  }

  /* ---------- 도장(seal) ---------- */
  .seal{
    width:34px; height:34px; border-radius:50%;
    background:var(--seal); color:var(--note);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:14px;
    box-shadow:0 1px 3px rgba(59,46,34,0.35);
    border:2px solid rgba(255,255,255,0.15);
    flex-shrink:0;
  }
  .seal-row{display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
  .seal-sm{width:26px;height:26px;font-size:11px;}

  /* ---------- 홈 화면: 그룹 카드 ---------- */
  .group-card{
    position:relative;
    background:var(--note);
    border:1px solid var(--paper-shadow);
    border-radius:4px 12px 12px 12px;
    padding:16px 16px 14px;
    margin-bottom:12px;
    box-shadow:0 2px 6px rgba(59,46,34,0.10);
  }
  .group-card::before{
    content:'';
    position:absolute; top:0; right:0;
    border-width:0 22px 22px 0;
    border-style:solid;
    border-color:transparent var(--paper) transparent transparent;
    filter:drop-shadow(-1px 1px 1px rgba(59,46,34,0.15));
  }
  .group-card-title{
    font-family:var(--font-display); font-size:19px; font-weight:700; margin:0 0 4px;
  }
  .group-card-meta{font-size:12.5px; color:var(--ink-soft); margin:0 0 10px;}
  .group-card-foot{display:flex; justify-content:space-between; align-items:center;}
  .stat-pill{
    font-size:11.5px; color:var(--jade-dark); background:rgba(62,92,84,0.10);
    padding:3px 9px; border-radius:20px; font-weight:600;
  }
  .empty-box{
    text-align:center; padding:34px 18px; color:var(--ink-soft);
    border:2px dashed var(--gold-line); border-radius:12px; font-size:14px;
  }

  /* ---------- 이용 약속(재미있는 약관) 화면 ---------- */
  .big-seal{
    width:64px; height:64px; border-radius:50%;
    background:var(--seal); color:var(--note);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:30px;
    margin:14px auto; box-shadow:0 3px 8px rgba(59,46,34,0.35);
    border:3px solid rgba(255,255,255,0.15);
    transform:rotate(-6deg);
  }
  .terms-list{ margin-bottom:18px; }
  .terms-item{
    font-size:13.5px; line-height:1.6; color:var(--ink);
    padding:11px 2px; border-bottom:1px dashed var(--paper-shadow);
  }
  .terms-item:last-child{ border-bottom:none; }
  .terms-item b{
    color:var(--seal); font-family:var(--font-display); font-size:14.5px;
    display:block; margin-bottom:3px;
  }
  .terms-check-row{
    display:flex; align-items:flex-start; gap:9px; font-size:13.5px; color:var(--ink-soft);
    margin:4px 0 6px; cursor:pointer; line-height:1.5; font-weight:600;
  }
  .terms-check-row input{
    margin-top:3px; width:17px; height:17px; flex-shrink:0; accent-color: var(--seal);
  }
  .btn-primary:disabled{ opacity:0.4; box-shadow:none; cursor:not-allowed; }
  .btn-primary:disabled:active{ transform:none; }

  /* ---------- 그룹 지도 화면 ---------- */
  .group-topbar{
    display:flex; align-items:center; gap:10px; margin-bottom:10px;
  }
  .group-topbar-title{flex:1; min-width:0;}
  .group-topbar-title h2{
    font-family:var(--font-display); font-size:19px; margin:0; line-height:1.2;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .group-topbar-title p{margin:1px 0 0; font-size:11.5px; color:var(--ink-soft);}

  .invite-panel{
    background:var(--note); border:1.5px dashed var(--gold-line); border-radius:10px;
    padding:12px 14px; margin-bottom:12px; font-size:13px;
  }
  .invite-code{
    font-family:var(--font-display); font-size:20px; font-weight:700;
    letter-spacing:0.12em; color:var(--seal);
  }
  .invite-panel .btn{width:auto; padding:8px 14px; font-size:13px; margin-top:8px;}

  #mapWrap{
    border:3px solid var(--note); outline:1px solid var(--paper-shadow);
    border-radius:10px; overflow:hidden; box-shadow:0 4px 14px rgba(59,46,34,0.18);
    position:relative;
  }
  #mapCanvas{ width:100%; height:52vh; min-height:340px; background:#ded0ac; }
  .leaflet-tile-pane{ filter: sepia(0.35) saturate(0.75) brightness(0.98) contrast(1.05); }
  .map-hint{
    position:absolute; top:10px; left:50%; transform:translateX(-50%);
    background:rgba(59,46,34,0.82); color:var(--note);
    padding:7px 14px; border-radius:20px; font-size:12.5px; z-index:500;
    pointer-events:none; white-space:nowrap;
  }
  .locate-btn{
    position:absolute; bottom:14px; right:10px; z-index:500;
    background:var(--note); border:1.5px solid var(--gold-line);
    width:40px; height:40px; border-radius:50%; font-size:17px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
  }

  .view-toggle{
    display:flex; gap:8px; margin:12px 0;
  }
  .view-toggle button{
    flex:1; padding:9px; border-radius:8px; border:1.5px solid var(--jade);
    background:transparent; color:var(--jade-dark); font-weight:700; font-size:13.5px;
  }
  .view-toggle button.active{background:var(--jade); color:var(--note);}

  /* ---------- 커스텀 마커 (핀) ---------- */
  .pin-seal{
    width:32px; height:32px; border-radius:50%;
    background:var(--seal); border:2px solid #fff8ea;
    color:#fff8ea; font-family:var(--font-display); font-weight:700; font-size:13px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.35);
  }

  /* ---------- 이야기 카드 (목록/상세 공용) ---------- */
  .story-card{
    background:var(--note); border:1px solid var(--paper-shadow);
    border-radius:10px; padding:14px; margin-bottom:12px;
    box-shadow:0 2px 5px rgba(59,46,34,0.08);
  }
  .story-card img{
    width:100%; max-height:220px; object-fit:cover; border-radius:8px; margin-bottom:10px;
    display:block;
  }
  .story-title{font-family:var(--font-display); font-size:17px; font-weight:700; margin:0 0 6px;}
  .story-caption{
    font-family:var(--font-ui); font-size:18px; line-height:1.5; color:var(--ink);
    margin:0 0 10px; white-space:pre-wrap;
  }
  .tag-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px;}
  .tag-chip{
    font-size:11.5px; color:var(--jade-dark); border:1.3px solid var(--jade);
    padding:2px 9px; border-radius:5px; font-weight:600; background:rgba(62,92,84,0.06);
  }
  .story-foot{
    display:flex; align-items:center; justify-content:space-between;
    font-size:11.5px; color:var(--ink-soft);
  }

  /* ---------- 모달 ---------- */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(59,46,34,0.55);
    display:flex; align-items:flex-end; justify-content:center; z-index:2000;
    animation:fadeIn .15s ease;
  }
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  .modal-card{
    background:var(--paper); width:100%; max-width:520px; max-height:88vh;
    overflow-y:auto; border-radius:18px 18px 0 0; padding:20px 18px 26px;
    box-shadow:0 -6px 24px rgba(0,0,0,0.3);
    animation:slideUp .18s ease;
  }
  @keyframes slideUp{from{transform:translateY(24px); opacity:0.6;}to{transform:translateY(0); opacity:1;}}
  .modal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .modal-head h3{font-family:var(--font-display); font-size:19px; margin:0;}
  .modal-close{background:none; border:none; font-size:22px; color:var(--ink-soft); line-height:1;}

  .photo-input-area{
    border:2px dashed var(--gold-line); border-radius:10px; padding:14px;
    text-align:center; margin-bottom:14px; background:var(--note);
  }
  .photo-preview{width:100%; max-height:200px; object-fit:cover; border-radius:8px; margin-bottom:8px;}
  .tag-edit-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;}
  .tag-edit-chip{
    font-size:12px; background:rgba(62,92,84,0.10); color:var(--jade-dark);
    padding:4px 8px 4px 10px; border-radius:6px; display:flex; align-items:center; gap:5px;
  }
  .tag-edit-chip button{background:none; border:none; color:var(--jade-dark); font-weight:700; font-size:13px;}

  .toast{
    position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
    background:var(--ink); color:var(--note); padding:11px 18px; border-radius:24px;
    font-size:13.5px; z-index:3000; box-shadow:0 4px 14px rgba(0,0,0,0.3);
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}

  .stamp-anim{animation:stampIn .5s cubic-bezier(.2,1.4,.4,1);}
  @keyframes stampIn{
    0%{transform:scale(2.2) rotate(-14deg); opacity:0;}
    60%{transform:scale(0.92) rotate(3deg); opacity:1;}
    100%{transform:scale(1) rotate(0deg); opacity:1;}
  }

  .member-strip{display:flex; align-items:center; gap:6px; margin-bottom:12px; flex-wrap:wrap;}
  .member-strip .more{font-size:12px; color:var(--ink-soft);}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* =================================================================
   잼얘여지도 — 독립형(Standalone) 버전
   Claude 계정 없이도 누구나 접속해서 쓸 수 있도록 Supabase를 백엔드로 사용합니다.
   아래 두 값을 본인의 Supabase 프로젝트 값으로 반드시 바꿔주세요.
   ================================================================= */

const SUPABASE_URL = 'https://goquzqvkcwpiyfdzpnto.supabase.co'; // ← Supabase 프로젝트 URL로 교체
const SUPABASE_KEY = 'sb_publishable_BIr7d8nDvK-1hpS0_7RLNg_yroUAY2S';          // ← Supabase anon/publishable key로 교체
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const SUPABASE_CONFIGURED = !SUPABASE_URL.includes('YOUR-PROJECT-REF') && !SUPABASE_KEY.includes('YOUR-ANON-OR-PUBLISHABLE-KEY');

const SEAL_CODE_CHARS = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';

const state = {
  profile: null,        // {name, userId}
  myGroups: [],         // [{code,name}]
  currentGroup: null,   // {code,name,created_at,creator_name}
  pins: [],             // pins of current group
  members: [],          // members of current group
  view: 'map',          // 'map' | 'list'
  leafletMap: null,
  markers: [],
  pendingLatLng: null,
  pendingPhoto: null,   // base64 string
  pendingTags: [],
  editingPinId: null,   // 수정 중인 핀 id (없으면 새 핀 생성 모드)
  listSearch: '',       // 모아보기 검색어
  realtimeChannel: null,
  lastDbError: null
};

/* ---------------- 로컬(개인) 저장 - 이름, 내가 가입한 그룹 목록 ---------------- */
function lsGet(key){
  try{
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : null;
  }catch(e){ return null; }
}
function lsSet(key, value){
  try{
    localStorage.setItem(key, JSON.stringify(value));
    return true;
  }catch(e){ console.warn('localStorage 사용 불가 (이 미리보기 환경 제약일 수 있어요):', e); return false; }
}

/* ---------------- Supabase(공유 데이터) 헬퍼 ---------------- */
async function dbCreateGroup(code, name, creatorName, userId){
  state.lastDbError = null;
  const { error: e1 } = await sb.from('groups').insert({ code, name, creator_name: creatorName });
  if(e1){ console.error(e1); state.lastDbError = e1.message || String(e1); return false; }
  const { error: e2 } = await sb.from('members').insert({ group_code: code, name: creatorName, user_id: userId });
  if(e2){ console.error(e2); state.lastDbError = e2.message || String(e2); return false; }
  return true;
}
async function dbGetGroup(code){
  state.lastDbError = null;
  const { data, error } = await sb.from('groups').select('*').eq('code', code).maybeSingle();
  if(error){ console.error(error); state.lastDbError = error.message || String(error); return null; }
  return data;
}
async function dbAddMember(code, name, userId){
  state.lastDbError = null;
  const { error } = await sb.from('members').insert({ group_code: code, name, user_id: userId });
  if(error){ console.error(error); state.lastDbError = error.message || String(error); return false; }
  return true;
}
async function dbRenameEverywhere(userId, newName){
  // 내(user_id) 소유의 모든 그룹 멤버 표시 이름 + 예전에 쓴 모든 이야기의 작성자 이름을 한 번에 갱신.
  // user_id로 정확히 매칭하기 때문에, 같은 이름을 쓰는 다른 사람의 기록에는 전혀 영향이 없음.
  state.lastDbError = null;
  const { error: e1 } = await sb.from('members').update({ name: newName }).eq('user_id', userId);
  if(e1){ console.error(e1); state.lastDbError = e1.message || String(e1); return false; }
  const { error: e2 } = await sb.from('pins').update({ author_name: newName }).eq('user_id', userId);
  if(e2){ console.error(e2); state.lastDbError = e2.message || String(e2); return false; }
  return true;
}
async function dbGetMembers(code){
  state.lastDbError = null;
  const { data, error } = await sb.from('members').select('*').eq('group_code', code).order('joined_at');
  if(error){ console.error(error); state.lastDbError = error.message || String(error); return []; }
  return data || [];
}
async function dbGetPins(code){
  state.lastDbError = null;
  const { data, error } = await sb.from('pins').select('*').eq('group_code', code).order('created_at');
  if(error){ console.error(error); state.lastDbError = error.message || String(error); return []; }
  return data || [];
}
async function dbGetPinsLight(code){
  // photo(사진 base64)를 뺀 가벼운 조회. 지도를 열 때마다 모든 사진을 다시 받지 않도록 함.
  state.lastDbError = null;
  const { data, error } = await sb.from('pins')
    .select('id, group_code, author_name, user_id, title, caption, tags, lat, lng, created_at, edited_by, edited_at')
    .eq('group_code', code).order('created_at');
  if(error){ console.error(error); state.lastDbError = error.message || String(error); return []; }
  return data || [];
}
async function dbGetPinPhoto(id){
  // 이야기를 실제로 열어볼 때만 그 사진 하나를 불러옴.
  const { data, error } = await sb.from('pins').select('photo').eq('id', id).maybeSingle();
  if(error){ console.error(error); return null; }
  return data ? data.photo : null;
}
async function ensurePhotosLoaded(pins){
  // 아직 사진을 안 받아온 핀들만 골라서 한 번에 불러옴 (모아보기 진입 시 사용)
  const missing = pins.filter(p => p.photo === undefined).map(p => p.id);
  if(missing.length === 0) return;
  const { data, error } = await sb.from('pins').select('id, photo').in('id', missing);
  if(error){ console.error(error); return; }
  const photoMap = {};
  (data || []).forEach(row => { photoMap[row.id] = row.photo; });
  pins.forEach(p => { if(p.id in photoMap) p.photo = photoMap[p.id]; });
}
async function dbCountPins(code){
  const { count, error } = await sb.from('pins').select('*', { count: 'exact', head: true }).eq('group_code', code);
  if(error){ console.error(error); return 0; }
  return count || 0;
}
async function dbCountMembers(code){
  const { count, error } = await sb.from('members').select('*', { count: 'exact', head: true }).eq('group_code', code);
  if(error){ console.error(error); return 0; }
  return count || 0;
}
async function dbInsertPin(pin){
  state.lastDbError = null;
  const { data, error } = await sb.from('pins').insert(pin).select().single();
  if(error){ console.error(error); state.lastDbError = error.message || String(error); return null; }
  return data;
}
async function dbUpdatePin(id, updates){
  state.lastDbError = null;
  const { data, error } = await sb.from('pins').update(updates).eq('id', id).select().single();
  if(error){ console.error(error); state.lastDbError = error.message || String(error); return null; }
  return data;
}
async function dbDeletePin(id){
  state.lastDbError = null;

  const { error } = await sb
    .from('pins')
    .delete()
    .eq('id', id);

  if(error){
    console.error(error);
    state.lastDbError = error.message || String(error);
    return false;
  }

  return true;
}
/* ---------------- 실시간 구독 (친구가 남긴 이야기를 바로 반영) ---------------- */
function subscribeToPins(code){
  if(state.realtimeChannel){ sb.removeChannel(state.realtimeChannel); state.realtimeChannel = null; }
  state.realtimeChannel = sb.channel('pins-'+code)
    .on('postgres_changes', { event:'*', schema:'public', table:'pins', filter:`group_code=eq.${code}` }, handlePinRealtimeEvent)
    .subscribe();
}
function handlePinRealtimeEvent(payload){
  if(payload.eventType === 'INSERT'){
    if(!state.pins.some(p => p.id === payload.new.id)){
      state.pins.push(payload.new);
      if(state.view === 'map' && state.leafletMap) addPinMarker(payload.new);
      if(state.view === 'list') renderStoryList();
      updateGroupCountText();
      if(payload.new.author_name !== state.profile.name){
        showToast(`${payload.new.author_name}님이 새 이야기를 새겼다네!`);
      }
    }
  }else if(payload.eventType === 'UPDATE'){
    const idx = state.pins.findIndex(p => p.id === payload.new.id);
    if(idx !== -1) state.pins[idx] = payload.new; else state.pins.push(payload.new);
    if(state.view === 'list') renderStoryList();
  }else if(payload.eventType === 'DELETE'){
    state.pins = state.pins.filter(p => p.id !== payload.old.id);
    updateGroupCountText();
    if(state.view === 'map') renderMapView(); else renderStoryList();
  }
}
function updateGroupCountText(){
  const el = document.querySelector('.group-topbar-title p');
  if(el) el.textContent = `이야기 ${state.pins.length}편 · 벗 ${state.members.length}명`;
}

function uid(){
  return (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2));
}
function escapeHtml(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(iso){
  try{
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }catch(e){ return ''; }
}
function generateGroupCode(){
  let code = '';
  for(let i=0;i<6;i++) code += SEAL_CODE_CHARS[Math.floor(Math.random()*SEAL_CODE_CHARS.length)];
  return code;
}
function generateUserId(){
  // 이 브라우저(기기)를 나타내는 고유 식별자. 이름이 같아도 이 값으로 서로 다른 사람임을 구분함.
  return (crypto.randomUUID ? crypto.randomUUID() : 'u-' + Date.now() + '-' + Math.random().toString(16).slice(2));
}
function sealInitial(name){
  if(!name) return '?';
  return name.trim().slice(0,1);
}
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=>t.classList.remove('show'), 2200);
}

async function init(){
  state.profile = lsGet('jamyeo_profile');
  if(state.profile && !state.profile.userId){
    state.profile.userId = generateUserId();
    lsSet('jamyeo_profile', state.profile);
  }
  state.myGroups = lsGet('jamyeo_my_groups') || [];

  if(!lsGet('jamyeo_agreed_terms')){
    renderTermsGate();
    return;
  }
  proceedAfterTerms();
}
function proceedAfterTerms(){
  if(!state.profile || !state.profile.name){
    renderNameSetup();
  }else{
    renderHome();
  }
}

async function submitChangeName(){

  const val = document
    .getElementById('changeNameInput')
    .value
    .trim();

  const err = document.getElementById('changeNameError');
  err.style.display = 'none';

  if(!val){
    err.textContent = '이름을 입력해주세요.';
    err.style.display = 'block';
    return;
  }

  if(val === state.profile.name){
    renderHome();
    return;
  }

  const btn = document.getElementById('changeNameSubmitBtn');
  btn.disabled = true;
  btn.textContent = '새기는 중…';

  const newName = val;
  const ok = await dbRenameEverywhere(state.profile.userId, newName);

  if(!ok){
    btn.disabled = false;
    btn.textContent = '새로 새기기';
    err.textContent = '이름을 고쳐 쓰지 못했다네: ' + (state.lastDbError || '알 수 없는 오류');
    err.style.display = 'block';
    return;
  }

  // 로컬 프로필 갱신
  state.profile.name = newName;
  lsSet('jamyeo_profile', state.profile);

  // 이미 메모리에 올라와 있는 현재 그룹의 멤버/이야기도 즉시 갱신 (내 user_id인 것만)
  state.members.forEach(m => { if(m.user_id === state.profile.userId) m.name = newName; });
  state.pins.forEach(p => { if(p.user_id === state.profile.userId) p.author_name = newName; });

  showToast('이름을 "' + newName + '"(으)로 고쳐 새겼다네!');
  renderHome();

}

async function submitJoinGroup(){
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  const err = document.getElementById('joinCodeError');
  if(!code){ err.textContent='코드를 입력해주세요.'; err.style.display='block'; return; }
  if(!SUPABASE_CONFIGURED){
    err.textContent = '아직 Supabase 설정이 안 되어 있어요. 코드 맨 위 SUPABASE_URL / SUPABASE_KEY를 본인 값으로 바꿔주세요.';

    return;
  }
  const group = await dbGetGroup(code);
  if(!group){
    err.textContent = state.lastDbError
      ? '지도를 찾지 못했어요: ' + state.lastDbError
      : '해당 코드의 지도를 찾을 수 없어요. 코드를 다시 확인해주세요.';
    err.style.display='block';

  if(!state.myGroups.find(g=>g.code===code)){
    await dbAddMember(code, state.profile.name, state.profile.userId);
    state.myGroups.push({code, name:group.name});
    lsSet('jamyeo_my_groups', state.myGroups);
  }
  showToast(`"${group.name}" 지도에 함께하게 되었다네!`);
  await openGroup(code, true);
}

async function openGroup(code, justJoined=false){
  const group = await dbGetGroup(code);
  if(!group){ showToast('지도를 펼치지 못했다네.'); renderHome(); return; }
  state.currentGroup = group;
  state.view = 'map';
  state.justJoined = justJoined;

  state.members = await dbGetMembers(code);
  state.pins = await dbGetPinsLight(code);
  subscribeToPins(code);

  renderGroupScreen();
}

  p.style.display = (p.style.display==='none') ? 'block' : 'none';
}
async function copyInviteCode(code){
  try{
    await navigator.clipboard.writeText(code);
    showToast('코드를 옮겨 적었다네!');
  }catch(e){
    showToast('코드: '+code+' (손수 옮겨 적어주시게)');
  }
}
async function switchView(view){
  state.view = view;
  document.getElementById('tabMap').classList.toggle('active', view==='map');
  document.getElementById('tabList').classList.toggle('active', view==='list');
  if(view==='map'){
    renderMapView();
  }else{
    const area = document.getElementById('viewArea');
    area.innerHTML = `<p class="helper-text">불러오는 중…</p>`;
    await ensurePhotosLoaded(state.pins);
    if(state.view === 'list') renderListView();
  }
}

/* ---- 지도 뷰 ---- */
function renderMapView(){
  const area = document.getElementById('viewArea');
  area.innerHTML = `
    <div id="mapWrap">
      <div class="map-hint" id="mapHint">지도를 짚어 이야기를 새겨보시게</div>
      <div id="mapCanvas"></div>
      <button class="locate-btn" onclick="locateMe()" title="내 위치로 이동">◎</button>
    </div>
  `;

  let centerLat = 37.5665, centerLng = 126.9780, zoom = 12;
  if(state.pins.length > 0){
    centerLat = state.pins.reduce((s,p)=>s+p.lat,0)/state.pins.length;
    centerLng = state.pins.reduce((s,p)=>s+p.lng,0)/state.pins.length;
    zoom = 13;
  }

  if(state.leafletMap){ state.leafletMap.remove(); state.leafletMap = null; }
  const map = L.map('mapCanvas', {zoomControl:true}).setView([centerLat, centerLng], zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'&copy; OpenStreetMap contributors',
    maxZoom:19
  }).addTo(map);
  state.leafletMap = map;

  map.on('click', e => {
    document.getElementById('mapHint').style.display='none';
    openPinModal(e.latlng.lat, e.latlng.lng);
  });

  state.markers = [];
  state.pins.forEach(pin => addPinMarker(pin));

  setTimeout(()=>{ map.invalidateSize(); }, 120);
}

function addPinMarker(pin){
  const icon = L.divIcon({
    className:'',
    html:`<div class="pin-seal">${escapeHtml(sealInitial(pin.author_name))}</div>`,
    iconSize:[32,32], iconAnchor:[16,30], popupAnchor:[0,-28]
  });
  const marker = L.marker([pin.lat, pin.lng], {icon}).addTo(state.leafletMap);
  marker.on('click', ()=> openPinDetail(pin.id));
  state.markers.push(marker);
}

function locateMe(){
  if(!navigator.geolocation){ showToast('이 기기에서는 위치를 알 수 없다네.'); return; }
  navigator.geolocation.getCurrentPosition(
    pos => { state.leafletMap.setView([pos.coords.latitude, pos.coords.longitude], 15); },
    () => showToast('그대의 위치를 찾지 못했다네.')
  );
}

/* ---- 모아보기(목록) 뷰 ---- */
function renderListView(){
  const area = document.getElementById('viewArea');
  area.innerHTML = `
    <div class="field" style="margin-bottom:14px;">
      <input type="text" id="listSearchInput" placeholder="🔍 제목·내용·태그·이름으로 찾기" value="${escapeHtml(state.listSearch)}" />
    </div>
    <div id="storyListArea"></div>
  `;
  const input = document.getElementById('listSearchInput');
  input.addEventListener('input', e => { state.listSearch = e.target.value; renderStoryList(); });
  renderStoryList();
}

function renderStoryList(){
  const listArea = document.getElementById('storyListArea');
  if(state.pins.length === 0){
    listArea.innerHTML = `<div class="empty-box">아직 새겨진 이야기가 없다네.<br/>지도 탭에서 첫 이야기를 새겨보시게!</div>`;
    return;
  }
  const q = state.listSearch.trim().toLowerCase();
  let filtered = [...state.pins];
  if(q){
    filtered = filtered.filter(p => {
      const hay = [p.title, p.caption, p.author_name, ...(p.tags||[])].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(q);
    });
  }
  filtered.sort((a,b)=> new Date(b.created_at)-new Date(a.created_at));
  if(filtered.length === 0){
    listArea.innerHTML = `<div class="empty-box">"${escapeHtml(state.listSearch)}"에 해당하는 이야기가 없어요.</div>`;
    return;
  }
  listArea.innerHTML = filtered.map(pin => `
    <div class="story-card" onclick="openPinDetail('${pin.id}')">
      ${pin.photo ? `<img src="${pin.photo}" alt="" />` : ''}
      ${pin.title ? `<div class="story-title">${escapeHtml(pin.title)}</div>` : ''}
      <div class="story-caption">${escapeHtml(pin.caption)}</div>
      ${pin.tags && pin.tags.length ? `<div class="tag-row">${pin.tags.map(t=>`<span class="tag-chip">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
      <div class="story-foot">
        <span>${escapeHtml(sealInitial(pin.author_name))} · ${escapeHtml(pin.author_name)}${pin.edited_at ? ' · 고쳐 새김' : ''}</span>
        <span>${fmtDate(pin.created_at)}</span>
      </div>
    </div>
  `).join('');
}

/* ================= 핀 생성/수정 모달 ================= */
function openPinModal(lat, lng, existingPin=null){
  const isEdit = !!existingPin;
  state.editingPinId = isEdit ? existingPin.id : null;
  state.pendingLatLng = isEdit ? {lat: existingPin.lat, lng: existingPin.lng} : {lat, lng};
  state.pendingPhoto = isEdit ? (existingPin.photo || null) : null;
  state.pendingTags = isEdit ? (existingPin.tags ? existingPin.tags.slice() : []) : [];

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'pinModalOverlay';
  overlay.innerHTML = `
    <div class="modal-card">
      <div class="modal-head">
        <h3>${isEdit ? '이야기 고쳐 새기기' : '이야기 새기기'}</h3>
        <button class="modal-close" onclick="closePinModal()">×</button>
      </div>

      <div class="field">
        <label for="pinTitle">제목 (없어도 무방하네)</label>
        <input type="text" id="pinTitle" maxlength="30" placeholder="예: 우다다 뛰던 강아지" value="${isEdit ? escapeHtml(existingPin.title || '') : ''}" />
      </div>

      <div class="photo-input-area" id="photoArea">
        ${ (isEdit && existingPin.photo) ? `
          <img src="${existingPin.photo}" class="photo-preview" alt="선택한 사진" />
          <button type="button" class="btn btn-ghost" onclick="clearPhoto()">사진 떼어내기</button>
        ` : `
          <input type="file" accept="image/*" id="photoInput" style="display:none" onchange="handlePhotoSelect(event)" />
          <button type="button" class="btn btn-ghost" onclick="document.getElementById('photoInput').click()">📷 사진 붙이기</button>
        `}
      </div>

      <div class="field">
        <label for="pinNote">무슨 일이 있었는가?</label>
        <textarea id="pinNote" placeholder="편히 적어보시게.">${isEdit ? escapeHtml(existingPin.caption || '') : ''}</textarea>
      </div>

      <div class="field">
        <label>태그</label>
        <div class="tag-edit-row" id="tagEditRow"></div>
        <input type="text" id="tagAddInput" placeholder="태그를 적고 Enter" maxlength="8" />
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" onclick="savePin()">${isEdit ? '고쳐 새기기' : '이야기 새기기'}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  renderTagChips();
  document.getElementById('tagAddInput').addEventListener('keydown', e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      const v = e.target.value.trim();
      if(v && !state.pendingTags.includes(v)){ state.pendingTags.push(v); renderTagChips(); }
      e.target.value='';
    }
  });
  document.addEventListener('keydown', escCloseModalOnce);
}
function escCloseModalOnce(e){
  if(e.key==='Escape'){ closePinModal(); closePinDetailModal(); }
}
function closePinModal(){
  const el = document.getElementById('pinModalOverlay');
  if(el) el.remove();
  document.removeEventListener('keydown', escCloseModalOnce);
}
function renderTagChips(){
  const row = document.getElementById('tagEditRow');
  if(!row) return;
  row.innerHTML = state.pendingTags.map((t,i)=>`
    <span class="tag-edit-chip">${escapeHtml(t)} <button onclick="removeTag(${i})">×</button></span>
  `).join('');
}
function removeTag(i){ state.pendingTags.splice(i,1); renderTagChips(); }

function handlePhotoSelect(e){
  const file = e.target.files[0];
  if(!file) return;
  resizeImageFile(file, 640, 0.65).then(base64 => {
    state.pendingPhoto = base64;
    const area = document.getElementById('photoArea');
    area.innerHTML = `
      <img src="${base64}" class="photo-preview" alt="선택한 사진" />
      <button type="button" class="btn btn-ghost" onclick="clearPhoto()">사진 제거</button>
    `;
  }).catch(()=> showToast('사진을 불러오지 못했다네.'));
}
function clearPhoto(){
  state.pendingPhoto = null;
  const area = document.getElementById('photoArea');
  area.innerHTML = `
    <input type="file" accept="image/*" id="photoInput" style="display:none" onchange="handlePhotoSelect(event)" />
    <button type="button" class="btn btn-ghost" onclick="document.getElementById('photoInput').click()">📷 사진 붙이기</button>
  `;
}
function resizeImageFile(file, maxWidth=640, quality=0.65){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if(w > maxWidth){ h = Math.round(h * (maxWidth/w)); w = maxWidth; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function savePin(){
  const title = document.getElementById('pinTitle').value.trim();
  const caption = document.getElementById('pinNote').value.trim();

  if(!caption && !state.pendingPhoto){
    showToast('이야기나 사진을 하나는 남겨주시게.');
    return;
  }

  const isEdit = !!state.editingPinId;

  if(isEdit){
    const updates = {
      title: title || null,
      caption: caption || '(사진만 남겼어요)',
      tags: state.pendingTags.slice(),
      photo: state.pendingPhoto,
      edited_by: state.profile.name,
      edited_at: new Date().toISOString()
    };
    const updated = await dbUpdatePin(state.editingPinId, updates);
    if(!updated){ showToast('고쳐 새기지 못했어요: ' + (state.lastDbError || '알 수 없는 오류')); return; }
    const idx = state.pins.findIndex(p => p.id === updated.id);
    if(idx !== -1) state.pins[idx] = updated;
    closePinModal();
    showToast('이야기를 고쳐 새겼다네!');
  }else{
    const newPin = {
      group_code: state.currentGroup.code,
      author_name: state.profile.name,
      user_id: state.profile.userId,
      title: title || null,
      caption: caption || '(사진만 남겼어요)',
      tags: state.pendingTags.slice(),
      lat: state.pendingLatLng.lat,
      lng: state.pendingLatLng.lng,
      photo: state.pendingPhoto
    };
    const inserted = await dbInsertPin(newPin);
    if(!inserted){ showToast('새기지 못했어요: ' + (state.lastDbError || '알 수 없는 오류')); return; }
    state.pins.push(inserted);
    addPinMarker(inserted);
    closePinModal();
    showToast('지도에 이야기를 새겼다네!');
  }

  updateGroupCountText();
  if(state.view === 'list') renderStoryList();
}

/* ================= 핀 상세 모달 ================= */
function openPinDetail(pinId){
  const pin = state.pins.find(p => p.id === pinId);
  if(!pin) return;
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'pinDetailOverlay';
  const photoHtml = pin.photo
    ? `<img src="${pin.photo}" alt="" />`
    : (pin.photo === undefined ? `<div id="pinDetailPhotoSlot" class="helper-text" style="padding:20px 0; text-align:center;">사진 불러오는 중…</div>` : '');
  overlay.innerHTML = `
    <div class="modal-card">
      <div class="modal-head">
        <h3>이야기</h3>
        <button class="modal-close" onclick="closePinDetailModal()">×</button>
      </div>
      <div class="story-card stamp-anim" style="box-shadow:none; border:none; padding:0; margin:0;">
        ${photoHtml}
        ${pin.title ? `<div class="story-title">${escapeHtml(pin.title)}</div>` : ''}
        <div class="story-caption">${escapeHtml(pin.caption)}</div>
        ${pin.tags && pin.tags.length ? `<div class="tag-row">${pin.tags.map(t=>`<span class="tag-chip">${escapeHtml(t)}</span>`).join('')}</div>` : ''}
        <div class="story-foot">
          <span class="seal-row"><span class="seal seal-sm">${escapeHtml(sealInitial(pin.author_name))}</span> ${escapeHtml(pin.author_name)}</span>
          <span>${fmtDate(pin.created_at)}</span>
        </div>
        ${pin.edited_at ? `<div class="helper-text" style="margin-top:8px;">✎ ${escapeHtml(pin.edited_by || '')}님이 ${fmtDate(pin.edited_at)}에 고쳐 새겼다네</div>` : ''}
      </div>
     <div class="btn-row">
  <button class="btn btn-secondary"
    onclick="openEditPinModal('${pin.id}')">
    ✎ 고쳐 새기기
  </button>

  <button class="btn btn-ghost"
    onclick="deletePin('${pin.id}')">
    🗑 지우기
  </button>
</div>
    </div>
  `;
  document.body.appendChild(overlay);
  document.addEventListener('keydown', escCloseModalOnce);

  if(pin.photo === undefined){
    dbGetPinPhoto(pin.id).then(photoVal => {
      pin.photo = photoVal || null;
      const slot = document.getElementById('pinDetailPhotoSlot');
      if(!slot) return; // 그새 모달이 닫혔으면 무시
      if(photoVal){
        slot.outerHTML = `<img src="${photoVal}" alt="" />`;
      }else{
        slot.remove();
      }
    });
  }
}
async function openEditPinModal(pinId){
  const pin = state.pins.find(p => p.id === pinId);
  if(!pin) return;
  if(pin.photo === undefined){
    pin.photo = (await dbGetPinPhoto(pin.id)) || null;
  }
  closePinDetailModal();
  openPinModal(null, null, pin);
}

function closePinDetailModal(){
  const el = document.getElementById('pinDetailOverlay');
  if(el) el.remove();
  document.removeEventListener('keydown', escCloseModalOnce);
}


// ================= 삭제 기능 =================
async function deletePin(pinId){

  if(!confirm("이 이야기를 정말 지우시겠는가?")) return;

  const ok = await dbDeletePin(pinId);

  if(!ok){
    showToast("지우지 못했어요.");
    return;
  }

  // 화면에서도 제거
  state.pins = state.pins.filter(p => p.id !== pinId);

  closePinDetailModal();

  updateGroupCountText();

  if(state.view === 'map'){
    renderMapView();
  }else{
    renderStoryList();
  }

  showToast("이야기를 지웠다네!");
}


/* ---------------- start ---------------- */
init();
</script>
